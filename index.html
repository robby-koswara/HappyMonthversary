<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buat Sayangku Tersayang ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">

<style>
:root {
  --bg1: #1a0b1c;
  --bg2: #0f0c1b;
  --bg3: #2a0820;
  --bg4: #2b1630;
  --accent: #ffd6e7;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4));
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  color: #fff;
  height: 100vh;
  width: 100vw;
  display: flex;
  align-items: center;
  justify-content: center; /* Memastikan kartu benar-benar di tengah secara horizontal */
  overflow: hidden;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* KARTU UTAMA */
.card {
  width: 90%;
  max-width: 400px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 30px;
  border-radius: 24px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 15px rgba(255,255,255,0.05);
  text-align: center;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  /* Tambahan untuk memastikan card tidak tergeser */
  margin-left: auto;
  margin-right: auto;
}

/* Menyembunyikan scrollbar bawaan agar tetap rapi */
.card::-webkit-scrollbar {
  display: none;
}
.card {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.card.visible {
  opacity: 1;
  transform: translateY(0);
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6em;
  margin-bottom: 15px;
  color: var(--accent);
  letter-spacing: 0.5px;
}

p {
  font-size: 0.95em;
  line-height: 1.8;
  opacity: 0.9;
  margin: 15px 0;
  min-height: 140px;
}

.media {
  width: 100%;
  border-radius: 16px;
  margin: 20px 0;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* PEMBARUAN PADA GAMBAR */
.media img {
  width: 100%;
  max-height: 300px;
  object-fit: cover;
  object-position: center;
  display: block;
  transition: transform 3s ease;
}

.media video {
  width: 100%;
  max-height: 350px;
  object-fit: cover;
  display: block;
}

.btn {
  margin-top: 20px;
  margin-bottom: 10px;
  padding: 12px 24px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, #ff8fb1, #ffc2d9);
  color: #2b0015;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: 0.3s ease;
  box-shadow: 0 4px 15px rgba(255, 143, 177, 0.3);
  opacity: 0;
  pointer-events: none;
}

.btn.show {
  opacity: 1;
  pointer-events: auto;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255, 143, 177, 0.4); }
  70% { box-shadow: 0 0 0 10px rgba(255, 143, 177, 0); }
  100% { box-shadow: 0 0 0 0 rgba(255, 143, 177, 0); }
}

.music {
  position: fixed;
  top: 20px;
  right: 20px;
  background: var(--glass);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 45px;
  height: 45px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 100;
}

.heart {
  position: fixed;
  bottom: -20px;
  font-size: 16px;
  animation: floatUp linear infinite;
  opacity: 0;
  z-index: -1;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 0; }
  20% { opacity: 0.5; }
  100% { transform: translateY(-120vh) scale(1.2) rotate(360deg); opacity: 0; }
}

#start-screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg1);
  z-index: 50;
  transition: opacity 1s ease;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="./music.mp3" type="audio/mpeg">
</audio>

<div class="music" onclick="toggleMusic()" id="music-btn" style="display:none;">🎵</div>

<div id="start-screen">
  <h1 style="font-size: 2em; margin-bottom: 20px;">Hai, Sayangku ❤️</h1>
  <button class="btn show" style="opacity: 1; pointer-events: auto;" onclick="startJourney()">Buka Suratnya</button>
</div>

<div id="app" style="display: none;"></div>

<script>
const scenes = [
{
  title: "Happy 7th Monthversary! 🎉❤️",
  img: "./foto1.jpg",
  text: "Hai, Cintaku...\n\nNggak kerasa ya, perjalanan kita udah sampai di bulan ke-7 🥳 Walaupun aku sering bikin pusing, makasih banyak udah bertahan sama aku 🥺",
  btn: "Lanjut"
},
{
  img: "./foto2.jpg",
  text: "Jujur, bulan ini berat banget buat kita ya 😔 Kita bahkan sempat 'udahan' sebentar.\n\nTernyata, membayangkan hidup tanpa kamu tuh jauh lebih menakutkan:' Aku nggak bisa ngebayangin harus jalani hari-hari tanpa kamu 🥺",
  btn: "Masih Ada Lagi..."
},
{
  video: "./video.mp4",
  text: "Semua momen ini bukan sekadar kenangan.\nIni bukti nyata kalau kita selalu punya alasan untuk terus jalan berdua, sesulit apapun itu🥰 Setiap senyum & tawa di situ bikin aku nggak mau menyerah 💪\n\nSemoga kita bisa bikin lebih banyak lagi kenangan indah Kenangan yang lebih hangat, tenang, dan selamanya sama kamu ❤️",
  btn: "Next"
},
{
  img: "./foto3.jpg",
  text: "Makasih ya, udah mau peluk kurangnya aku lagi 🥺 Makasih udah kasih kita kesempatan kedua ❤️\n\nJanji ya, kalau nanti ada badai, kita jangan lepas pegangan 🤝. Berantem secukupnya, sayangnya selamanya ♾️",
  btn: "Pesan dari Hatiku..."
},
{
  title: "I Love You, Always ❤️♾️",
  text: "Aku bukan yang paling sempurna di dunia, tapi aku pastikan kamu satu-satunya yang aku tuju 🥰\n\nSelamat 7 bulan, Sayang. Mari menua bersama dan saling melengkapi ya? 🤗❤️",
  btn: "Pesan Terakhir ❤️",
  last: true
}
];

let currentScene = 0;
let typeInterval;

function startJourney() {
  document.getElementById("start-screen").style.opacity = '0';
  setTimeout(() => {
    document.getElementById("start-screen").style.display = 'none';
    document.getElementById("app").style.display = 'block';
    document.getElementById("music-btn").style.display = 'flex';
    
    let audio = document.getElementById("music");
    audio.volume = 0.5;
    audio.play().catch(e => console.log("Audio play failed:", e));
    
    renderScene();
  }, 1000);
}

function typeWriter(element, text, index, buttonElement) {
  if (index < text.length) {
    let char = text.charAt(index);
    if (char === '\n') {
      element.innerHTML += '<br>';
    } else {
      element.innerHTML += char;
    }
    typeInterval = setTimeout(() => typeWriter(element, text, index + 1, buttonElement), 50);
  } else {
    buttonElement.classList.add('show');
    // Scroll otomatis ke bawah tombol kalau kontennya panjang setelah selesai mengetik
    document.querySelector('.card').scrollTo({ top: document.querySelector('.card').scrollHeight, behavior: 'smooth' });
  }
}

function renderScene() {
  let s = scenes[currentScene];
  let app = document.getElementById("app");
  
  if(app.children.length > 0) {
    app.children[0].classList.remove('visible');
  }

  setTimeout(() => {
    let html = `<div class="card" id="card-content">`;
    if(s.title) html += `<h1>${s.title}</h1>`;
    if(s.img) html += `<div class="media"><img src="${s.img}"></div>`;
    if(s.video) html += `<div class="media"><video autoplay muted loop playsinline><source src="${s.video}" type="video/mp4"></video></div>`;
    html += `<p id="text-container"></p>`;
    if(!s.last){
      html += `<button class="btn" id="action-btn" onclick="nextScene()">${s.btn}</button>`;
    } else {
      html += `<button class="btn" id="action-btn" onclick="revealFinal()">🤍</button>`;
    }
    html += `</div>`;
    app.innerHTML = html;

    setTimeout(() => {
      document.getElementById('card-content').classList.add('visible');
      let textContainer = document.getElementById('text-container');
      let actionBtn = document.getElementById('action-btn');
      clearTimeout(typeInterval);
      
      // Auto-scroll ke atas saat pindah scene
      document.querySelector('.card').scrollTop = 0;
      
      typeWriter(textContainer, s.text, 0, actionBtn);
    }, 100);
  }, app.children.length > 0 ? 500 : 0);
}

function nextScene() {
  currentScene++;
  renderScene();
}

function revealFinal() {
  let app = document.getElementById("app");
  app.children[0].classList.remove('visible');

  setTimeout(() => {
    let finalHtml = `
    <div class="card" id="card-content">
      <h1 style="font-style: italic;">Untuk kamu... ❤️</h1>
      <p id="text-container"></p>
    </div>
    `;
    app.innerHTML = finalHtml;

    setTimeout(() => {
      document.getElementById('card-content').classList.add('visible');
      // Pesan terakhir yang membumi tapi tetap romantis
      let finalText = "Kalau nanti dunia terasa berat, tolong ingat momen kita hari ini 🥰\n\nDari awal, aku selalu memilih kamu. Dan setelah semua yang kita lalui, aku sadar kalau aku akan terus memilih kamu ❤️\n\nUdah terlanjur sayang, repot kalau harus ganti yang baru:'\n\nSelamat 7 bulan, Sayang. \nAku sayang kamu, sangat ❤️";
      let textContainer = document.getElementById('text-container');
      let dummyBtn = document.createElement('div'); 
      clearTimeout(typeInterval);
      
      document.querySelector('.card').scrollTop = 0;
      typeWriter(textContainer, finalText, 0, dummyBtn);
    }, 100);
  }, 500);
}

function toggleMusic() {
  let m = document.getElementById("music");
  let btn = document.getElementById("music-btn");
  if (m.paused) {
    m.play();
    btn.style.opacity = "1";
  } else {
    m.pause();
    btn.style.opacity = "0.5";
  }
}

setInterval(() => {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = ["🤍", "✨", "💕"][Math.floor(Math.random() * 3)];
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (Math.random() * 3 + 4) + "s";
  h.style.fontSize = (Math.random() * 10 + 10) + "px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 7000);
}, 800);
</script>

</body>
</html>
